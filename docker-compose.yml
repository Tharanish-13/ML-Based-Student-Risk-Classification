version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: risk_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: risk_backend
    ports:
      - "8000:8000"
    depends_on:
      - mongo
    environment:
      # MONGODB_URI: "mongodb://mongo:27017/"
      JWT_SECRET: "your_jwt_secret_key_change_this"
      # If using external Mongo Atlas as requested, override this env var.
      # But for local docker-compose, using the mongo service is preferred.
      # To use the Atlas URI provided in prompt, uncomment below:
      MONGODB_URI: "mongodb+srv://stark_tharanish_admin:stark_talez@cluster0.nwu4iqm.mongodb.net/?appName=Cluster0"

  frontend:
    build: ./frontend
    container_name: risk_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      VITE_API_URL: "http://backend:8000"

volumes:
  mongo_data:
